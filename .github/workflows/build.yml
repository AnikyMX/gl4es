name: Build gl4es Android (Helio P35 Ultimate)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Ambil Source Code
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Android NDK (Pasti Valid)
    # Kita pakai nttld versi 1 (stabil) dan NDK r25c (paling kompatibel buat gl4es)
    - name: ⚙️ Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c

    # 3. Konfigurasi CMake
    # PERBAIKAN VITAL: Kita set Environment Variable secara eksplisit
    # Flags disesuaikan strict untuk Cortex-A53 (Helio P35) + PowerVR GE8320
    - name: 🔧 Configure CMake
      run: |
        # Set Path NDK dari output step sebelumnya
        export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
        
        echo "Check NDK Path: $ANDROID_NDK_HOME"
        
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID=ON \
          -DNOX11=ON \
          -DNO_GBM=ON \
          -G "Unix Makefiles" \
          -DCMAKE_C_FLAGS="-mcpu=cortex-a53 -mtune=cortex-a53 -ftree-vectorize -ffast-math -funwind-tables"

    # 4. Proses Compile
    - name: 🔨 Build with Make
      run: |
        cd build
        make -j$(nproc)

    # 5. Upload Hasil Build
    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gl4es-android-helio-p35
        path: build/lib/libGL.so