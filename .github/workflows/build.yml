name: Build gl4es Android (Fix Path)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # Kita kasih ID 'setup-ndk' supaya output path-nya bisa kita panggil nanti
    - name: ⚙️ Setup Android NDK
      id: setup-ndk
      uses: android-actions/setup-ndk@v3
      with:
        ndk-version: r25c

    - name: 📦 Install Build Essentials
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential make

    # Debugging: Cek apakah path benar-benar ada (Opsional, buat mastiin aja)
    - name: 🔍 Check NDK Path
      run: |
        echo "NDK Path is: ${{ steps.setup-ndk.outputs.ndk-path }}"
        ls -F ${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake

    - name: 🔧 Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID=ON \
          -DNOX11=ON \
          -DNO_GBM=ON \
          -G "Unix Makefiles" \
          -DCMAKE_C_FLAGS="-mcpu=cortex-a53 -mtune=cortex-a53 -ftree-vectorize -ffast-math -funwind-tables"

    - name: 🔨 Build with Make
      run: |
        cd build
        make -j$(nproc)

    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gl4es-android-helio-p35
        path: build/lib/libGL.so