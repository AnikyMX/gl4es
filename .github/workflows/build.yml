name: Build gl4es for Android (Helio P35 Fix)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Ambil Source Code
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Android NDK (Menggunakan Official Action)
    # Kita pakai versi r25c yang sangat stabil untuk gl4es
    - name: ⚙️ Setup Android NDK
      uses: android-actions/setup-ndk@v3
      with:
        ndk-version: r25c

    # 3. Install Dependencies Tambahan
    # Memastikan 'make' dan tool build dasar tersedia
    - name: 📦 Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential make

    # 4. Konfigurasi CMake
    # PERBAIKAN: Menggunakan $ANDROID_NDK_HOME yang pasti valid
    - name: 🔧 Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID=ON \
          -DNOX11=ON \
          -DNO_GBM=ON \
          -G "Unix Makefiles" \
          -DCMAKE_C_FLAGS="-mcpu=cortex-a53 -mtune=cortex-a53 -ftree-vectorize -ffast-math -funwind-tables"

    # 5. Proses Compile
    - name: 🔨 Build with Make
      run: |
        cd build
        make -j$(nproc)

    # 6. Upload Hasil Build
    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gl4es-android-helio-p35
        path: build/lib/libGL.so