name: Build gl4es Android (Helio P35 Fixed Path)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Ambil Source Code
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Android NDK (nttld r25c)
    - name: ⚙️ Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c

    # 3. Konfigurasi CMake
    - name: 🔧 Configure CMake
      run: |
        export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID=ON \
          -DNOX11=ON \
          -DNO_GBM=ON \
          -G "Unix Makefiles" \
          -DCMAKE_C_FLAGS="-mcpu=cortex-a53 -mtune=cortex-a53 -ftree-vectorize -ffast-math -funwind-tables"

    # 4. Proses Compile
    - name: 🔨 Build with Make
      run: |
        cd build
        make -j$(nproc)

    # 5. [DEBUG] Cek Lokasi File
    # Kita list isi folder 'lib' di root untuk memastikan filenya ada
    - name: 🔍 Check Output Files
      run: |
        echo "Listing root lib directory:"
        ls -R lib/

    # 6. Upload Hasil Build
    # Menggunakan wildcard (*) untuk mengambil libGL.so, libGL.so.1, dll.
    # Path diarahkan ke 'lib/' (bukan 'build/lib/') sesuai CMakeLists.txt
    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gl4es-android-helio-p35
        path: lib/libGL.so*