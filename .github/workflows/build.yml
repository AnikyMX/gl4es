name: Build gl4es for Android (Helio P35)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Ambil Source Code
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Android NDK (Penting untuk compile C/C++ di Android)
    - name: ⚙️ Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b # Versi NDK stabil modern

    # 3. Konfigurasi CMake
    # Kita menyuntikkan flags spesifik untuk Cortex-A53 (Helio P35)
    - name: 🔧 Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID=ON \
          -DNOX11=ON \
          -DNO_GBM=ON \
          -DCMAKE_C_FLAGS="-mcpu=cortex-a53 -mtune=cortex-a53 -ftree-vectorize -ffast-math -funwind-tables"

    # 4. Proses Compile
    - name: 🔨 Build with Make
      run: |
        cd build
        make -j$(nproc)

    # 5. Upload Hasil Build (libGL.so)
    - name: 📤 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gl4es-android-helio-p35
        path: build/lib/libGL.so